name: CI/CD - Netlify

on:
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # 1. Integração Contínua (Testes e Lint)
  # ----------------------------------------------------
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript Compilation
        # Verifica se há erros de tipagem antes de fazer o deploy
        run: npm run build -- --noEmit 

  # ----------------------------------------------------
  # 2. Entrega Contínua (Deploy para o Netlify)
  # ----------------------------------------------------
  deploy:
    name: Build & Deploy to Netlify
    runs-on: ubuntu-latest
    needs: validate # Garante que o deploy só ocorra se a validação passar
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Netlify
        # Utiliza a CLI oficial do Netlify para o deploy da pasta dist
        run: npx netlify-cli deploy --dir=dist --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}