name: CI/CD - React Frontend

on:
  push:
    branches:
      - main # ou master

jobs:
  # ----------------------------------------------------
  # 1. Integração Contínua (Testes e Lint)
  # ----------------------------------------------------
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

      - name: Check TypeScript Compilation
        run: npm run build -- --noEmit # Se o seu script de build já não fizer isso
q
  # ----------------------------------------------------
  # 2. Entrega Contínua (Deploy para o Fly.io)
  # ----------------------------------------------------
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: validate # Só roda se o job de validação passar
    concurrency: deploy-group

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Application
        # --remote-only faz o Fly buildar o Docker nos servidores deles, economizando tempo no Github Actions
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}